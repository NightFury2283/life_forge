<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeForge — Чат + Календарь</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 h-screen overflow-hidden">
    <div class="flex h-screen">
        <!-- ЧАТ (левая панель) -->
        <div id="chat-panel" class="w-1/2 bg-white shadow-2xl border-r border-gray-200 flex flex-col resizable">
            <div class="p-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
                <h1 class="text-2xl font-bold">🤖 LifeForge AI</h1>
                <p class="text-blue-100">Авторизуйся: <a href="/auth/google" class="underline">Google Calendar</a></p>
            </div>

            <!-- Сообщения -->
            <div id="messages" class="flex-1 p-6 overflow-y-auto space-y-4 bg-gray-50">
                <div class="text-center text-gray-500 py-8">Начни чат!</div>
            </div>

            <!-- Input -->
            <div class="p-6 bg-white border-t border-gray-200">
                <div class="flex gap-2">
                    <input id="user-message" type="text" placeholder="Напиши сообщение..."
                        class="flex-1 p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                        autocomplete="off">

                    <button id="send-button" type="button"
                        class="p-4 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-all">
                        ➤
                    </button>
                </div>
                <div class="text-xs text-gray-500 mt-2 text-center">
                    /clear-chat | /calendar
                </div>
            </div>
        </div>

        <!-- calendar-panel -->
        <div id="calendar-panel" class="w-1/2 shadow-2xl resizable">
            <div class="p-6 bg-gradient-to-r from-emerald-600 to-teal-600 text-white sticky top-0 z-10 flex justify-between items-center">
                <h2 class="text-xl font-bold">📅 Google Calendar</h2>
                <div class="flex gap-2">
                    <a href="/static/calendar.html" target="_blank"
                       class="px-3 py-1 bg-white/20 rounded-lg hover:bg-white/30 text-sm font-medium transition-colors flex items-center gap-2 backdrop-blur-sm border border-white/10 shadow-sm">
                        📊 Гант
                    </a>
                    <button onclick="toggleCalendarSize()"
                        class="px-3 py-1 bg-white/20 rounded-full hover:bg-white/30 transition-colors backdrop-blur-sm border border-white/10">
                        ↔
                    </button>
                </div>
            </div>
            <!-- Google Calendar iframe -->
            <iframe id="google-calendar"
                src="https://calendar.google.com/calendar/embed?src=alexklinniy@gmail.com&ctz=Europe%2FMoscow"
                class="w-full h-full border-0" style="min-height: 600px;" allowfullscreen scrolling="no">
            </iframe>
        </div>
    </div>

    <script>
        console.log('=== LifeForge AI Debug ===');
        console.log('Скрипт начал выполнение');

        // Основная функция отправки сообщения
        async function sendMessage(event) {
            console.log('=== ФУНКЦИЯ SENDMESSAGE ВЫЗВАНА ===');

            if (event) {
                event.preventDefault(); // ТОЛЬКО preventDefault
                console.log('Event предотвращен');
            }

            const input = document.getElementById('user-message');
            console.log('Найден input элемент:', input);

            if (!input) {
                console.error('ERROR: input элемент не найден!');
                showBotMessage('❌ Ошибка: поле ввода не найдено');
                return;
            }

            const message = input.value.trim();
            console.log('Содержимое input:', `"${input.value}"`);
            console.log('Сообщение после trim:', `"${message}"`);

            if (!message) {
                console.log('Пустое сообщение, выход из функции');
                showBotMessage('Напишите что-нибудь...');
                return;
            }

            console.log('Сообщение для отправки:', message);

            // Показываем сообщение пользователя
            showUserMessage(message);
            input.value = '';
            console.log('Поле ввода очищено');

            // Показываем индикатор загрузки
            showLoading();

            try {
                console.log('Начинаем отправку на сервер /chat...');

                // Добавляем таймаут для отладки
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                    console.warn('Таймаут запроса');
                }, 10000);

                // ВАЖНО: отправляем {text: message} как ожидает сервер
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: message }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                console.log('Ответ получен, статус:', response.status);
                console.log('Ответ OK?', response.ok);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Текст ошибки:', errorText);
                    throw new Error(`HTTP ошибка ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                console.log('Данные ответа от сервера:', data);

                // Проверяем разные возможные поля ответа
                if (data.response) {
                    showBotMessage(data.response);
                } else if (data.message) {
                    showBotMessage(data.message);
                } else if (data.error) {
                    showBotMessage('Ошибка: ' + data.error);
                } else {
                    console.warn('Непонятный формат ответа:', data);
                    showBotMessage('Получен ответ: ' + JSON.stringify(data, null, 2));
                }

                // Обновляем календарь
                refreshCalendar();
            } catch (error) {
                console.error('ОШИБКА при отправке:', error);

                let errorMessage = '❌ Ошибка соединения';
                if (error.name === 'AbortError') {
                    errorMessage = '❌ Таймаут запроса (10 сек)';
                } else if (error.message.includes('HTTP')) {
                    errorMessage = `❌ ${error.message}`;
                }

                showBotMessage(errorMessage);
            } finally {
                hideLoading();
                input.focus();
                console.log('=== ФУНКЦИЯ SENDMESSAGE ЗАВЕРШЕНА ===');
            }
        }

        function showUserMessage(message) {
            console.log('Показываем сообщение пользователя:', message);
            const messages = document.getElementById('messages');
            const userDiv = document.createElement('div');
            userDiv.className = 'message p-4 rounded-2xl bg-blue-500 text-white ml-auto max-w-3xl animate-slide-in mb-4';
            userDiv.textContent = message;
            messages.appendChild(userDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function showBotMessage(message) {
            console.log('Показываем сообщение бота:', message);
            const messages = document.getElementById('messages');
            const botDiv = document.createElement('div');
            botDiv.className = 'message p-4 rounded-2xl bg-green-100 border border-green-200 max-w-3xl animate-slide-in mb-4';
            botDiv.innerHTML = `
                <div class="font-semibold text-green-800 mb-1">🤖 LifeForge AI:</div>
                <div class="text-gray-800">${message}</div>
            `;
            messages.appendChild(botDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function showLoading() {
            console.log('Показываем индикатор загрузки');
            const messages = document.getElementById('messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-indicator';
            loadingDiv.className = 'message p-4 rounded-2xl bg-gray-100 border border-gray-200 max-w-3xl animate-slide-in mb-4';
            loadingDiv.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600"></div>
                    <span class="text-gray-600">AI думает...</span>
                </div>
            `;
            messages.appendChild(loadingDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function hideLoading() {
            console.log('Скрываем индикатор загрузки');
            const loadingDiv = document.getElementById('loading-indicator');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        function refreshCalendar() {
            console.log('Обновляем календарь');
            const iframe = document.getElementById('google-calendar');
            if (iframe) {
                // Перезагружаем iframe для обновления событий
                iframe.src = iframe.src.split('&refresh=')[0] + '&refresh=' + new Date().getTime();
            }
        }

        function toggleCalendarSize() {
            console.log('Изменяем размер панелей');
            const chatPanel = document.getElementById('chat-panel');
            const calendarPanel = document.getElementById('calendar-panel');

            if (chatPanel.style.width === '20%') {
                chatPanel.style.width = '50%';
                calendarPanel.style.width = '50%';
            } else {
                chatPanel.style.width = '20%';
                calendarPanel.style.width = '80%';
            }
        }

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            console.log('=== DOM ЗАГРУЖЕН ===');

            const input = document.getElementById('user-message');
            const sendButton = document.getElementById('send-button');

            console.log('Найден input:', input);
            console.log('Найден send-button:', sendButton);

            // Фокус на input
            if (input) {
                input.focus();
                console.log('Фокус установлен на input');
            } else {
                console.error('ERROR: input не найден при загрузке!');
            }

            // Обработчик для кнопки
            if (sendButton) {
                console.log('Добавляем обработчик на кнопку');
                sendButton.addEventListener('click', function (e) {
                    console.log('Кнопка нажата через addEventListener');
                    sendMessage(e);
                });
                console.log('Обработчик добавлен');
            } else {
                console.error('ERROR: кнопка не найдена!');
            }

            // Обработчик Enter в input
            if (input) {
                input.addEventListener('keypress', function (e) {
                    console.log('Нажата клавиша в input:', e.key, 'Код:', e.keyCode);

                    if (e.key === 'Enter' && !e.shiftKey) {
                        console.log('Enter нажат, отправляем сообщение');
                        e.preventDefault();
                        sendMessage(e);
                    }
                });
                console.log('Обработчик Enter добавлен');
            }

            // Тестовый запрос для проверки соединения
            console.log('Проверяем соединение с сервером...');
            fetch('/')
                .then(res => console.log('Сервер доступен, статус:', res.status))
                .catch(err => console.error('Сервер недоступен:', err));

            console.log('=== ИНИЦИАЛИЗАЦИЯ ЗАВЕРШЕНА ===');
        });

        // Глобальная обработка ошибок
        window.addEventListener('error', function (event) {
            console.error('Глобальная ошибка:', event.error);
            console.error('В файле:', event.filename, 'строка:', event.lineno);
            showBotMessage('❌ JavaScript ошибка: ' + event.error.message);
        });

        console.log('=== СКРИПТ ЗАГРУЖЕН ===');
    </script>

    <style>
        .resizable {
            resize: horizontal;
            overflow: auto;
        }

        #chat-panel:hover,
        #calendar-panel:hover {
            cursor: col-resize;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</body>

</html>
